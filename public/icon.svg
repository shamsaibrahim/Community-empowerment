<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #0d9488; }
      .foreground { fill: white; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #14b8a6; }
      .foreground { fill: #1e293b; }
    }
  </style>
  <rect class="background" width="180" height="180" rx="37" />
  <!-- Three connected people representing community -->
  <g class="foreground">
    <!-- Center person (larger, representing empowerment) -->
    <circle cx="90" cy="55" r="16" fill="currentColor"/>
    <path d="M90 75 C65 75 55 95 55 110 L55 115 C55 118 57 120 60 120 L120 120 C123 120 125 118 125 115 L125 110 C125 95 115 75 90 75Z" fill="currentColor"/>
    <!-- Left person -->
    <circle cx="45" cy="70" r="12" fill="currentColor"/>
    <path d="M45 85 C28 85 22 100 22 112 L22 115 C22 117 24 119 26 119 L50 119" fill="currentColor"/>
    <!-- Right person -->
    <circle cx="135" cy="70" r="12" fill="currentColor"/>
    <path d="M135 85 C152 85 158 100 158 112 L158 115 C158 117 156 119 154 119 L130 119" fill="currentColor"/>
    <!-- Rising arrow/growth symbol -->
    <path d="M75 135 L90 125 L105 135 L100 135 L100 150 L80 150 L80 135 Z" fill="currentColor"/>
    <!-- Connection lines -->
    <path d="M60 90 Q75 80 90 90" stroke="currentColor" stroke-width="3" fill="none"/>
    <path d="M90 90 Q105 80 120 90" stroke="currentColor" stroke-width="3" fill="none"/>
  </g>
</svg>